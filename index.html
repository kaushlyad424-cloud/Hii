<!DOCTYPE html>
<html>
<head>

<title>GW Warriors</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

img{
margin-top:80px;
width:320px;
border-radius:20px;
box-shadow:0 0 30px cyan;
}

h1{
letter-spacing:4px;
text-shadow:0 0 15px blue;
}

.nextbtn{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#000,#333);
color:white;
cursor:pointer;
box-shadow:0 0 20px white;
}

.nextbtn:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<img src="gorilla.png">

<h1>GW Warriors</h1>

<br>

<button class="nextbtn"
onclick="nextPage()">NEXT</button>

<audio id="bgmusic" loop>

<source src="sound.mp3"
type="audio/mpeg">

</audio>

<script>

document.body.addEventListener
("click",function(){

document.getElementById
("bgmusic").play();

});

function nextPage(){

window.location.href="page2.html";

}

</script>

</body>
</html>
